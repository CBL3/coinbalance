services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: coinbalance-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - ./VERSION:/app/VERSION:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: coinbalance-postgres
    environment:
      POSTGRES_DB: coinbalance
      POSTGRES_USER: coinbalance
      POSTGRES_PASSWORD: coinbalance
    ports:
      - "5432:5432"
    volumes:
      - coinbalance_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: coinbalance-redis
    ports:
      - "6379:6379"

volumes:
  coinbalance_postgres_data:
